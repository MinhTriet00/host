<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 FB88</title>
    <meta property="og:title" content="🔥 Bảnh thì xem 🔥">
    <meta property="og:description" content="Có tuất mới sợ">
    <meta property="og:type" content="website">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%);
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            transition: background 0.5s ease; /* Thêm hiệu ứng chuyển màu mượt */
        }

        .container {
            background: var(--card-bg);
            padding: 2.5rem 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.6s ease-out;
            transition: box-shadow 0.5s ease;
        }

        h1 {
            margin-top: 0;
            font-size: 1.8rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
            /* Thêm CSS để chống bôi đen chữ khi nhấn giữ trên điện thoại */
            -webkit-user-select: none;
            user-select: none; 
            cursor: pointer;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        input[type=text] {
            width: 100%;
            padding: 0.85rem 1rem;
            margin-bottom: 1.5rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            box-sizing: border-box;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input[type=text]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.9rem 2rem;
            font-size: 1rem;
            border-radius: 0.75rem;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .result-box {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #f8fafc;
            border-radius: 1rem;
            border-left: 4px solid var(--primary);
            text-align: left;
            animation: slideUp 0.5s ease-out forwards;
            display: none;
        }

        .result-box h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .result-box p {
            margin: 0;
            font-size: 1.05rem;
            color: var(--text-main);
            line-height: 1.5;
            font-weight: 500;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <h1 id="tieuDe">🔮 Check độ gay</h1>
        <p class="subtitle">Nhập tên của bạn để xem vũ trụ nói gì nhé!</p>
        
        <div onkeypress="if(event.keyCode == 13) boiToan()">
            <input type="text" id="ten" placeholder="Ví dụ: Nguyễn Văn A" required>
            <button onclick="boiToan()">Check</button>
        </div>

        <div id="ketQua" class="result-box">
            <h2 id="tenHienThi"></h2>
            <p id="noiDungBoi"></p>
        </div>
    </div>

    <script>
        // --- XỬ LÝ CHẾ ĐỘ SIÊU GAY (EASTER EGG) ---
        let isSuperGayMode = false;
        let holdTimer;
        const tieuDe = document.getElementById('tieuDe');

        // Bắt đầu đếm thời gian khi nhấn chuột/chạm tay
        function batDauNhan() {
            holdTimer = setTimeout(() => {
                kichHoatCheDoAn();
            }, 1500); // Nhấn giữ 1.5 giây để kích hoạt
        }

        // Hủy đếm nếu thả chuột/tay ra sớm
        function ketThucNhan() {
            clearTimeout(holdTimer);
        }

        // Gắn sự kiện cho cả PC (mouse) và Mobile (touch)
        tieuDe.addEventListener('mousedown', batDauNhan);
        tieuDe.addEventListener('mouseup', ketThucNhan);
        tieuDe.addEventListener('mouseleave', ketThucNhan);
        tieuDe.addEventListener('touchstart', batDauNhan);
        tieuDe.addEventListener('touchend', ketThucNhan);

        function kichHoatCheDoAn() {
            if (isSuperGayMode) return; // Đã bật rồi thì thôi

            const pin = prompt("Chế độ siêu gay\\nNhập mã pin:");
            
            if (pin === "tôi là gay") {
                isSuperGayMode = true;
                
                // Đổi nền web sang màu đỏ rực lửa
                document.body.style.background = "linear-gradient(135deg, #ff0000 0%, #7a0000 100%)";
                document.getElementById('mainContainer').style.boxShadow = "0 10px 30px rgba(255, 0, 0, 0.4)";
                
                // Đổi màu viền kết quả cho tone-sur-tone
                document.documentElement.style.setProperty('--primary', '#dc2626');
                
                alert("🔥 Đã kích hoạt CHẾ ĐỘ SIÊU GAY! 🔥");
            } else if (pin !== null) {
                alert("Sai mã PIN!");
            }
        }


        // --- THUẬT TOÁN BÓI TOÁN CŨ ---
        function laySeedTuTen(str) {
            let hash = 0;
            str = str.toLowerCase().trim();
            for (let i = 0; i < str.length; i++) {
                let char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash);
        }

        function boiToan() {
            const ten = document.getElementById('ten').value;
            if (!ten.trim()) {
                alert("Vui lòng nhập tên của bạn nhé!");
                return;
            }

            const ketQuaBox = document.getElementById('ketQua');
            
            // Reset animation
            ketQuaBox.style.animation = 'none';
            ketQuaBox.offsetHeight; /* Trigger reflow */
            ketQuaBox.style.animation = null; 

            document.getElementById('tenHienThi').innerText = "Chào " + ten + "! ✨";

            // KIỂM TRA: Nếu đang bật chế độ Siêu Gay thì ghi đè kết quả
            if (isSuperGayMode) {
                document.getElementById('noiDungBoi').innerText = `Xin chào vua gay, ${ten}. Ngài đánh rơi thứ này👑`;
                ketQuaBox.style.display = "block";
                return; // Kết thúc hàm luôn
            }

            // Nếu bình thường thì chạy logic băm chuỗi
            const seed = laySeedTuTen(ten);
            const phanTram = seed % 101; 
            
            const khoLuuTru = [
                `Máy quét nhận diện bạn có ${phanTram}% độ 'Bóng'. Quá bất ngờ! 🏳️‍🌈`,
                `Chỉ số nhan sắc tiềm ẩn của bạn đang dừng ở mức ${phanTram}%.`,
                `Hệ thống đánh giá bạn mang ${phanTram}% sự mặn mòi của biển cả. 🌊`,
                `Độ 'ngáo ngơ' của bạn hôm nay chạm mốc ${phanTram}%. Cẩn thận nhé!`,
                `Vũ trụ gửi gắm đến bạn ${phanTram}% năng lượng tích cực ngày hôm nay. ✨`,
                `Phát hiện ${phanTram}% sự lươn lẹo trong con người này! 👀`
            ];
            
            const cauBoi = khoLuuTru[seed % khoLuuTru.length];
            document.getElementById('noiDungBoi').innerText = cauBoi;
            ketQuaBox.style.display = "block";
        }
    </script>
</body>
</html>
