<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 FB88</title>
    <meta property="og:title" content="🔥 Bảnh thì xem 🔥">
    <meta property="og:description" content="Có tuất mới sợ">
    <meta property="og:type" content="website">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%);
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            transition: background 0.5s ease;
            overflow: hidden; 
        }

        /* --- HIỆU ỨNG HẠT NHIỄU CHUYỂN ĐỘNG --- */
        .noise-overlay {
            position: fixed;
            top: -50%; 
            left: -50%; 
            width: 200vw; 
            height: 200vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.15;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            mix-blend-mode: overlay; 
            animation: noiseAnim 0.15s infinite; 
        }

        @keyframes noiseAnim {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-2%, -2%); }
            20% { transform: translate(1%, 2%); }
            30% { transform: translate(-2%, 1%); }
            40% { transform: translate(2%, -1%); }
            50% { transform: translate(-1%, 2%); }
            60% { transform: translate(2%, -2%); }
            70% { transform: translate(0%, 1%); }
            80% { transform: translate(-2%, -1%); }
            90% { transform: translate(1%, 2%); }
            100% { transform: translate(0, 0); }
        }

        .container {
            background: var(--card-bg);
            padding: 2.5rem 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.6s ease-out;
            transition: all 0.4s ease;
            position: relative;
            z-index: 10;
        }

        /* --- HIỆU ỨNG RUNG LẮC KHI SAI PIN --- */
        .shake-error {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
            box-shadow: 0 0 30px rgba(220, 38, 38, 0.6) !important;
            border: 1px solid #dc2626;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0) rotate(-0.5deg); }
            20%, 80% { transform: translate3d(4px, 0, 0) rotate(0.5deg); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0) rotate(-1deg); }
            40%, 60% { transform: translate3d(6px, 0, 0) rotate(1deg); }
        }

        h1 {
            margin-top: 0;
            font-size: 1.8rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
            /* CÁC THUỘC TÍNH FIX LỖI "HIỆN BOX XANH" VÀ CHỐNG COPY KHI NHẤN GIỮ */
            -webkit-user-select: none;
            user-select: none; 
            -webkit-tap-highlight-color: transparent; 
            -webkit-touch-callout: none; 
            outline: none;
            cursor: pointer;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
            transition: color 0.3s ease;
        }

        input[type=text] {
            width: 100%;
            padding: 0.85rem 1rem;
            margin-bottom: 1.5rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            box-sizing: border-box;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input[type=text]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.9rem 2rem;
            font-size: 1rem;
            border-radius: 0.75rem;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .result-box {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #f8fafc;
            border-radius: 1rem;
            border-left: 4px solid var(--primary);
            text-align: left;
            animation: slideUp 0.5s ease-out forwards;
            display: none;
        }

        .result-box h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        /* --- THIẾT KẾ BẢNG NHẬP PIN BÍ MẬT NẰM TRONG WEB --- */
        .secret-panel {
            background: #fff5f5;
            border: 2px dashed #f87171;
            padding: 1.5rem;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            display: none;
            animation: slideUp 0.4s ease-out;
        }

        .secret-panel h3 {
            margin-top: 0;
            color: #dc2626;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .secret-btn-group {
            display: flex;
            gap: 10px;
        }

        .btn-cancel {
            background-color: #64748b;
        }
        .btn-cancel:hover {
            background-color: #475569;
            box-shadow: 0 4px 12px rgba(100, 116, 139, 0.3);
        }

        .error-text {
            color: #dc2626;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 1rem;
            margin-bottom: 0;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="noise-overlay" id="hieuUngNhieu"></div>

    <div class="container" id="mainContainer">
        <h1 id="tieuDe">🔮 Check độ gay</h1>
        <p class="subtitle" id="giaoDienPhu">Nhập tên của bạn để xem vũ trụ nói gì nhé!</p>
        
        <div class="secret-panel" id="bangSecret">
            <h3>🕵️‍♂️ CHẾ ĐỘ SIÊU GAY</h3>
            <p style="font-size: 0.85rem; color: #7f1d1d; margin-top: 0; margin-bottom: 1rem;">Hệ thống yêu cầu xác minh mã lớp bảo mật mật mã.</p>
            
            <div onkeypress="if(event.keyCode == 13) xacThucPin()">
                <input type="text" id="maPin" placeholder="Mã pin bí mật..." autocomplete="off" autocorrect="off" spellcheck="false" style="-webkit-text-security: disc;">
                <div class="secret-btn-group">
                    <button onclick="xacThucPin()" style="background-color: #dc2626;">Kích hoạt</button>
                    <button onclick="dongBangSecret()" class="btn-cancel">Hủy</button>
                </div>
            </div>
            <p class="error-text" id="txtLoi"></p>
        </div>

        <div id="formChinh" onkeypress="if(event.keyCode == 13) boiToan()">
            <input type="text" id="ten" placeholder="Ví dụ: Nguyễn Văn A" required autocomplete="off">
            <button onclick="boiToan()">Check</button>
        </div>

        <div id="ketQua" class="result-box">
            <h2 id="tenHienThi"></h2>
            <p id="noiDungBoi"></p>
        </div>
    </div>

    <script>
        let isSuperGayMode = false;
        let holdTimer;

        const tieuDe = document.getElementById('tieuDe');
        const hieuUngNhieu = document.getElementById('hieuUngNhieu');
        const mainContainer = document.getElementById('mainContainer');
        const bangSecret = document.getElementById('bangSecret');
        const formChinh = document.getElementById('formChinh');
        const txtLoi = document.getElementById('txtLoi');
        const giaoDienPhu = document.getElementById('giaoDienPhu');

        // --- SỰ KIỆN NHẤN GIỮ ---
        function batDauNhan(e) {
            // Không chặn e.preventDefault() ở đây để tránh làm chết nút bấm trên một số màn hình
            holdTimer = setTimeout(() => {
                moBangSecret();
            }, 1000); // Giảm thời gian nhấn giữ xuống 1 giây cho lẹ
        }

        function ketThucNhan() {
            clearTimeout(holdTimer);
        }

        tieuDe.addEventListener('mousedown', batDauNhan);
        tieuDe.addEventListener('mouseup', ketThucNhan);
        tieuDe.addEventListener('mouseleave', ketThucNhan);
        tieuDe.addEventListener('touchstart', batDauNhan, {passive: true});
        tieuDe.addEventListener('touchend', ketThucNhan);
        tieuDe.addEventListener('touchcancel', ketThucNhan);

        // --- ĐIỀU KHIỂN BẢNG PIN TRÊN GIAO DIỆN ---
        function moBangSecret() {
            if (isSuperGayMode) return;
            formChinh.style.display = "none";
            document.getElementById('ketQua').style.display = "none";
            txtLoi.style.display = "none";
            bangSecret.style.display = "block";
            document.getElementById('maPin').focus();
        }

        function dongBangSecret() {
            bangSecret.style.display = "none";
            formChinh.style.display = "block";
            document.getElementById('maPin').value = "";
        }

        function xacThucPin() {
            // Dùng toLowerCase() để người dùng nhập "Tôi là gay" hay "TÔI LÀ GAY" đều ăn
            const pinVal = document.getElementById('maPin').value.trim().toLowerCase();
            
            if (pinVal === "tôi là gay") {
                isSuperGayMode = true;
                
                document.body.style.background = "linear-gradient(135deg, #ff0000 0%, #7a0000 100%)";
                mainContainer.style.boxShadow = "0 10px 30px rgba(255, 0, 0, 0.4)";
                document.documentElement.style.setProperty('--primary', '#dc2626');
                document.documentElement.style.setProperty('--primary-hover', '#b91c1c');
                
                giaoDienPhu.innerText = "⚡ QUYỀN NĂNG VUA GAY ĐĐ ĐƯỢC THIẾT LẬP ⚡";
                giaoDienPhu.style.color = "#ef4444";
                giaoDienPhu.style.fontWeight = "bold";

                hieuUngNhieu.style.opacity = '0.35';
                hieuUngNhieu.style.mixBlendMode = 'multiply';
                
                dongBangSecret();
            } else {
                mainContainer.classList.add('shake-error');
                
                const caKhiaList = [
                    "🛑 Sai rồi! Định giả vờ làm bóng hả? Không dễ đâu! 💅",
                    "🚨 Hệ thống phát hiện 'Trai Thẳng' xâm nhập!!!",
                    "🤡 Gà! Bạn quá thẳng để bước vào lãnh địa này.",
                    "🏳️‍🌈 Xin lỗi, máy quét không nhận diện được sóng gay từ bạn.",
                    "👀 Tính lừa bổn cung à? Về học lại mật khẩu đi cưng!"
                ];
                const loiNhan = caKhiaList[Math.floor(Math.random() * caKhiaList.length)];
                
                txtLoi.innerText = loiNhan;
                txtLoi.style.display = "block";

                setTimeout(() => {
                    mainContainer.classList.remove('shake-error');
                }, 500);
            }
        }

        // --- THUẬT TOÁN BÓI TOÁN ---
        function laySeedTuTen(str) {
            let hash = 0;
            str = str.toLowerCase().trim();
            for (let i = 0; i < str.length; i++) {
                let char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash);
        }

        function boiToan() {
            const ten = document.getElementById('ten').value;
            if (!ten.trim()) {
                alert("Vui lòng nhập tên của bạn nhé!");
                return;
            }

            const ketQuaBox = document.getElementById('ketQua');
            
            ketQuaBox.style.animation = 'none';
            ketQuaBox.offsetHeight; 
            ketQuaBox.style.animation = null; 

            document.getElementById('tenHienThi').innerText = "Chào " + ten + "! ✨";

            if (isSuperGayMode) {
                document.getElementById('noiDungBoi').innerText = `Xin chào vua gay, ${ten}. Ngài đánh rơi thứ này👑`;
                ketQuaBox.style.display = "block";
                return; 
            }

            const seed = laySeedTuTen(ten);
            const phanTram = seed % 101; 
            
            const khoLuuTru = [
                `Máy quét nhận diện bạn có ${phanTram}% độ 'Bóng'. Quá bất ngờ! 🏳️‍🌈`,
                `Chỉ số nhan sắc tiềm ẩn của bạn đang dừng ở mức ${phanTram}%.`,
                `Hệ thống đánh giá bạn mang ${phanTram}% sự mặn mòi của biển cả. 🌊`,
                `Độ 'ngáo ngơ' của bạn hôm nay chạm mốc ${phanTram}%. Cẩn thận nhé!`,
                `Vũ trụ gửi gắm đến bạn ${phanTram}% năng lượng tích cực ngày hôm nay. ✨`,
                `Phát hiện ${phanTram}% sự lươn lẹo trong con người này! 👀`
            ];
            
            const cauBoi = khoLuuTru[seed % khoLuuTru.length];
            document.getElementById('noiDungBoi').innerText = cauBoi;
            ketQuaBox.style.display = "block";
        }
    </script>
</body>
</html>
